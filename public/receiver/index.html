<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealChallenge Cast Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       ROOT VARIABLES — copied from override.css
    ═══════════════════════════════════════════ */
    :root {
      --color-orange-light: #ff950a;
      --color-orange: #ff7700;
      --color-gray-light: #2f3e50;
      --color-gray: #232932;
      --color-gray-dark: #171e27;
      --color-black: #222222;
      --color-white: #fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-gray-dark);
      color: #fff;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .font-paragraph-white {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      color: var(--color-white);
      line-height: 25px;
    }
    .font-heading-white {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-style: italic;
      color: var(--color-white);
      line-height: 40px;
    }

    /* ═══════════════════════════════════════════
       PLAYER WRAPPER — fullscreen for TV
       (same as .player-wrapper fullscreen mode)
    ═══════════════════════════════════════════ */
    .player-wrapper {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000;
    }

    /* ═══════════════════════════════════════════
       VIDEO — copied from player.css .react-player
    ═══════════════════════════════════════════ */
    .react-player {
      width: 100% !important;
      height: 100% !important;
    }
    .react-player > video,
    #exercise-video {
      width: 100%;
      height: 100%;
      object-fit: contain !important;
      position: absolute;
      top: 0; left: 0;
      background: #000;
    }

    /* Exercise-start cover (see #exercise-loading-cover in the markup). Same
       colour as the break overlay so the hand-off is seamless. Sits above the
       video + controls; hidden the moment the new video reports 'playing'. */
    #exercise-loading-cover {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1d242c;
      z-index: 11;
      display: none;
    }
    #exercise-loading-cover.active { display: block; }

    /* ═══════════════════════════════════════════
       CONTROLS DETAILS — exercise title overlay
       Copied exactly from player.css
    ═══════════════════════════════════════════ */
    .controls-details {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }
    .controls-details.active {
      display: flex;
    }
    .controls-details-top-title {
      margin-top: 30px;
      /* TV readability: these labels are viewed from across a room, so they
         run much larger than the in-app player's 18px */
      font-size: 40px;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      margin-left: 45px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
    }
    .controls-details-bottom-title {
      text-align: right;
      /* the app uses 50px, but its control bar auto-hides — on the TV the
         bottom controls (stepper/progress/buttons, ~110px) are always
         visible, so the "Up next" line must clear them */
      margin-bottom: 120px;
      font-size: 30px;
      font-weight: 800;
      padding-right: 45px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
    }

    /* ═══════════════════════════════════════════
       CONTROLS WRAPPER — bottom overlay
       Copied exactly from player.css
    ═══════════════════════════════════════════ */
    .controls-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }
    .controls-wrapper.active {
      display: flex;
    }
    .controls-wrapper-top {
      display: flex;
      justify-content: space-between;
      padding: 20px 30px;
      text-shadow: 1px 1px 2px rgba(150, 150, 150, 0.6);
      align-items: center;
    }
    .controls-wrapper-middle {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      width: clamp(250px, 50%, 500px);
      margin: 0 auto;
      height: 100%;
      padding: 16px;
    }
    .controls-wrapper-bottom {
      padding: 0 20px 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .controls-wrapper-bottom > div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 200px;
    }
    .controls-wrapper-bottom-icons {
      height: 50px;
      cursor: pointer;
    }

    .player-elasped-time-container {
      padding-right: 10px;
      padding-top: 10px;
      font-size: clamp(14px, 2vw, 20px);
      min-width: 60px;
      width: auto;
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════
       PLAY/PAUSE BOX — copied from player.css
    ═══════════════════════════════════════════ */
    .player-play-pause-icon-box {
      background-color: var(--color-orange);
      margin: 0px clamp(10px, 2vw, 25px) 0px clamp(15px, 3vw, 35px);
      padding: clamp(6px, 1vw, 8px) clamp(8px, 1.5vw, 12px);
      box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Inline SVG play/pause icons */
    .icon-play, .icon-pause {
      width: 40px;
      height: 40px;
    }
    .icon-skip {
      width: 28px;
      height: 28px;
      cursor: pointer;
      opacity: 0.8;
    }
    .icon-skip:hover { opacity: 1; }

    /* ═══════════════════════════════════════════
       STEPPER — copied from player.css
    ═══════════════════════════════════════════ */
    .react-player-stepper-container {
      display: grid;
      height: 5px;
      padding: 0 30px;
      margin-bottom: 20px;
    }
    .react-player-stepper {
      margin: 0 3px;
    }

    /* ═══════════════════════════════════════════
       BREAK OVERLAY — copied from player.css
    ═══════════════════════════════════════════ */
    .break-layout-for-player {
      /* OPAQUE on the TV (the app uses a translucent overlay over a paused
         frame): the video keeps PLAYING during breaks here — pausing it
         stalls the device's whole media pipeline (music + beep) — so the
         overlay must fully hide it */
      background-color: #1d242c;
      position: absolute;
      top: 0px;
      width: 100%;
      z-index: 10;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: space-between;
    }
    .break-layout-for-player.active {
      display: flex;
    }
    .inner-layout-break {
      margin: 0 30px;
      color: #fff;
      display: flex;
      align-items: center;
      flex-grow: 1;
      justify-content: space-between;
    }
    .inner-layout-break-totalsecs {
      font-size: 64px;
      font-weight: 700;
      margin-right: 5px;
    }
    .inner-layout-break-sec {
      font-size: 30px;
    }
    .inner-layout-break-text {
      font-size: 34px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      text-align: center;
    }

    /* Progress bar (mimics Ant Design Progress) */
    .ant-progress-outer {
      width: 100%;
      margin-top: 8px;
    }
    .ant-progress-inner {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .ant-progress-bg {
      height: 100%;
      background: var(--color-orange);
      border-radius: 4px;
      transition: width 1s linear;
    }

    /* ═══════════════════════════════════════════
       IDLE & COMPLETE SCREENS
    ═══════════════════════════════════════════ */
    .screen-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 25;
      background: var(--color-gray-dark);
    }
    .screen-overlay.active { display: flex; }

    .idle-title { font-size: 56px; font-weight: 700; color: var(--color-orange); }
    .idle-subtitle { font-size: 26px; color: rgba(255,255,255,0.6); margin-top: 14px; }

    .complete-check { font-size: 70px; color: var(--color-orange); margin-bottom: 15px; }
    .complete-title { font-size: 44px; font-weight: 700; color: var(--color-orange); }
    .complete-subtitle { font-size: 26px; color: rgba(255,255,255,0.7); margin-top: 14px; }

    /* ═══════════════════════════════════════════
       PAUSED OVERLAY
    ═══════════════════════════════════════════ */
    .paused-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 15;
    }
    .paused-overlay.active { display: flex; }

    /* Start exercise play icon (matches RenderedVideoPlayer "Start Exercise" screen) */
    .start-play-icon {
      width: 80px;
      height: 80px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .start-play-icon:hover { transform: scale(1.15); }

    /* Seek slider (mimics react-video-seek-slider) */
    .seek-slider-wrap {
      margin: 0 30px 0 35px;
      padding-bottom: 20px;
    }
    .seek-slider {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      position: relative;
    }
    .seek-slider-fill {
      height: 100%;
      background: var(--color-orange);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* Workout title in top-right (the "Day 1" label the client flagged as
       barely visible — enlarged and brightened for TV viewing distance) */
    .player-workout-title {
      position: absolute;
      top: 26px; right: 40px;
      font-size: 32px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
      z-index: 2;
      display: none;
    }
    .player-workout-title.active { display: block; }
  </style>
</head>
<body>
  <div class="player-wrapper">

    <!-- Idle Screen -->
    <div id="idle-screen" class="screen-overlay active">
      <div class="idle-title">RealChallenge</div>
      <div class="idle-subtitle">Waiting for workout...</div>
    </div>

    <!-- Version badge: always visible in the corner so we can confirm which
         receiver build the TV actually loaded (text set from RECEIVER_VERSION) -->
    <div id="receiver-version" style="position: fixed; bottom: 10px; right: 14px; font-size: 13px; color: rgba(255,255,255,0.35); z-index: 99; font-family: inherit;"></div>

    <!-- Complete Screen -->
    <div id="complete-screen" class="screen-overlay">
      <div class="complete-check">&#10003;</div>
      <div class="complete-title">Workout Complete!</div>
      <div class="complete-subtitle" id="complete-workout-name"></div>
    </div>

    <!-- Video -->
    <video id="exercise-video" playsinline></video>

    <!-- Dark cover shown from exercise-start until the NEW video is actually
         playing — hides the previous exercise (which keeps looping through the
         break to hold the audio pipeline) and the black load gap, so the switch
         reads as break → dark → new video with no flash of the old clip. -->
    <div id="exercise-loading-cover"></div>

    <!-- Break / Get Ready overlay (matches .break-layout-for-player) -->
    <div id="break-overlay" class="break-layout-for-player">
      <div class="inner-layout-break">
        <div style="width: 30%; text-align: center;">
          <span style="margin-top: 10px;">
            <span class="inner-layout-break-totalsecs" id="break-countdown"></span>
            <span class="inner-layout-break-sec" id="break-sec-unit">Sec</span>
          </span>
          <!-- Progress bar (mimics Ant Design Progress) -->
          <div class="ant-progress-outer">
            <div class="ant-progress-inner">
              <div class="ant-progress-bg" id="break-progress-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>
        <div class="inner-layout-break-text">
          <span id="break-label-text">Rest</span>
          <span id="break-next-text"></span>
          <!-- Next exercise preview (client spec: rest = pause + next preview) -->
          <img id="break-next-thumb" alt="" style="display: none; margin-top: 16px; height: 180px; border-radius: 6px; object-fit: cover; align-self: center;" />
        </div>
      </div>
    </div>

    <!-- Paused overlay -->
    <div id="paused-overlay" class="paused-overlay">
      <svg class="start-play-icon" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
        <polygon points="26,20 26,44 46,32" fill="rgba(255,255,255,0.8)"/>
      </svg>
    </div>

    <!-- Workout title top-right -->
    <div id="workout-title-bar" class="player-workout-title">
      <span id="workout-title-text"></span>
    </div>

    <!-- Controls Details (exercise title + timer overlay) — matches controls-details -->
    <div id="controls-details" class="controls-details">
      <div class="controls-details-top-title font-paragraph-white">
        <span id="exercise-title"></span>
        <span id="exercise-timer-wrap" style="margin-top: 14px;">
          <span id="exercise-timer" style="font-size: 44px; margin-right: 6px;"></span>
          <span id="exercise-timer-unit">Sec</span>
        </span>
      </div>
      <div class="controls-details-bottom-title font-paragraph-white">
        <span id="details-break-info"></span>
      </div>
    </div>

    <!-- Controls Wrapper (play/pause, skip, stepper) — matches controls-wrapper -->
    <div id="controls-wrapper" class="controls-wrapper">
      <!-- Top: empty space (no back button or icons on TV) -->
      <div class="controls-wrapper-top">
        <div></div>
        <div></div>
      </div>

      <!-- Middle: empty (same as original — just spacer) -->
      <div class="controls-wrapper-middle"></div>

      <!-- Bottom: time | skip | play/pause | skip | time -->
      <div class="controls-wrapper-bottom">
        <span class="font-paragraph-white player-elasped-time-container" id="elapsed-time">00:00</span>
        <div>
          <!-- Skip prev -->
          <svg class="icon-skip" id="btn-prev" viewBox="0 0 24 24" fill="white">
            <polygon points="11,5 2,12 11,19"/>
            <polygon points="22,5 13,12 22,19"/>
          </svg>

          <!-- Play/Pause button -->
          <div class="player-play-pause-icon-box" id="btn-play-pause">
            <!-- Pause icon (two bars) -->
            <svg id="icon-pause" class="icon-pause" viewBox="0 0 40 40" fill="white">
              <rect x="10" y="8" width="6" height="24" rx="1"/>
              <rect x="24" y="8" width="6" height="24" rx="1"/>
            </svg>
            <!-- Play icon (triangle) -->
            <svg id="icon-play" class="icon-play" viewBox="0 0 40 40" fill="white" style="display:none;">
              <polygon points="12,6 12,34 34,20"/>
            </svg>
          </div>

          <!-- Skip next -->
          <svg class="icon-skip" id="btn-next" viewBox="0 0 24 24" fill="white">
            <polygon points="2,5 11,12 2,19"/>
            <polygon points="13,5 22,12 13,19"/>
          </svg>
        </div>
        <span class="font-paragraph-white player-elasped-time-container" id="total-time" style="text-align: right;">00:00</span>
      </div>

      <!-- Seek slider — hidden so the TV matches the local player (stepper
           only). Kept in the DOM so updateProgressBar()'s #progress-bar
           reference stays valid. -->
      <div class="seek-slider-wrap" style="display: none;">
        <div class="seek-slider">
          <div class="seek-slider-fill" id="progress-bar" style="width: 0%"></div>
        </div>
      </div>

      <!-- Exercise stepper (matches .react-player-stepper-container) -->
      <div class="react-player-stepper-container" id="exercise-stepper"></div>
    </div>
  </div>

  <!-- Audio -->
  <audio id="music-player" loop></audio>
  <audio id="break-start-sound" preload="auto"></audio>
  <audio id="break-end-sound" preload="auto"></audio>

  <script>
    'use strict';

    const NAMESPACE = 'urn:x-cast:com.realchallenge.workout';
    const GET_READY_SECONDS = 5;
    // Fire the exercise-end chime this many seconds BEFORE the exercise timer
    // hits 0. The device's ~1s audio session-switch means a sound triggered
    // exactly at 0 is heard ~1s late; leading it makes the chime land right on
    // the exercise→break transition (same reason the countdown beep fires at
    // "4" to be heard at "3"). Tunable if the device runs faster/slower.
    const CHIME_LEAD_SECONDS = 1;

    // Bump on every receiver change — shown in the corner of the TV and sent
    // in every STATE_UPDATE so the sender can log which build the TV runs.
    const RECEIVER_VERSION = 'v3.9 — 2026-07-15 (smooth exercise switch, no old-clip flash)';

    const $ = (id) => document.getElementById(id);

    const dom = {
      idleScreen:        $('idle-screen'),
      completeScreen:    $('complete-screen'),
      completeWorkout:   $('complete-workout-name'),
      video:             $('exercise-video'),
      exerciseCover:     $('exercise-loading-cover'),
      breakOverlay:      $('break-overlay'),
      breakCountdown:    $('break-countdown'),
      breakProgressBar:  $('break-progress-bar'),
      breakLabelText:    $('break-label-text'),
      breakNextText:     $('break-next-text'),
      breakNextThumb:    $('break-next-thumb'),
      pausedOverlay:     $('paused-overlay'),
      workoutTitleBar:   $('workout-title-bar'),
      workoutTitle:      $('workout-title-text'),
      controlsDetails:   $('controls-details'),
      exerciseTitle:     $('exercise-title'),
      exerciseTimer:     $('exercise-timer'),
      exerciseTimerWrap: $('exercise-timer-wrap'),
      detailsBreakInfo:  $('details-break-info'),
      controlsWrapper:   $('controls-wrapper'),
      stepper:           $('exercise-stepper'),
      progressBar:       $('progress-bar'),
      elapsedTime:       $('elapsed-time'),
      totalTime:         $('total-time'),
      btnPlayPause:      $('btn-play-pause'),
      iconPause:         $('icon-pause'),
      iconPlay:          $('icon-play'),
      btnNext:           $('btn-next'),
      btnPrev:           $('btn-prev'),
      musicPlayer:       $('music-player'),
      breakStartSound:   $('break-start-sound'),
      breakEndSound:     $('break-end-sound'),
    };

    let workout = null;
    let exercises = [];
    let currentIndex = 0;
    let phase = 'idle';
    let isPaused = false;
    let countdownValue = 0;
    let countdownInterval = null;
    let exerciseElapsed = 0;
    let exerciseInterval = null;
    let chimeFired = false;       // guards the exercise-end chime to once per exercise
    let chimeFadeStarted = false; // guards the pre-chime music fade-out to once per exercise
    let exerciseTimerFallback = null; // starts the countdown if the video never fires 'playing'
    let exerciseGen = 0;              // invalidates stale video 'playing' handlers after a skip
    let totalElapsed = 0;
    let totalDuration = 0;

    // ── Localization ──
    // The receiver is a static page, so the sender (which has the app's i18n)
    // passes a pre-translated label set in LOAD_WORKOUT. These English values
    // are the fallback for older senders that don't send `labels`. Exercise
    // titles are never translated — they render exactly as entered.
    let labels = {
      rest: 'Rest',
      getReady: 'Get Ready',
      upNext: 'Up next',
      nextExercise: 'Next Exercise',
      finish: 'Finish',
      workoutComplete: 'Workout Complete!',
      waitingForWorkout: 'Waiting for workout...',
      sec: 'Sec',
      workout: 'Workout',
    };

    // Push the localized strings into the static screens (idle/complete) and
    // the fixed unit labels. Phase-specific text is set in each phase handler.
    function applyStaticLabels() {
      const idleSub = document.querySelector('#idle-screen .idle-subtitle');
      if (idleSub) idleSub.textContent = labels.waitingForWorkout;
      const completeTitle = document.querySelector('#complete-screen .complete-title');
      if (completeTitle) completeTitle.textContent = labels.workoutComplete;
      const exUnit = $('exercise-timer-unit');
      if (exUnit) exUnit.textContent = labels.sec;
      const breakUnit = $('break-sec-unit');
      if (breakUnit) breakUnit.textContent = labels.sec;
    }

    // ── ONE-ELEMENT AUDIO ENGINE (v2.9) ──
    // On-device diagnostics (v2.8) established three hardware facts:
    //  1. Audio routes to ONE media element session. Web Audio output is
    //     queued while any media element holds the route — the beep only
    //     sounded when the pipeline reconfigured at exercise start.
    //  2. A video play()/pause() transition silently breaks the music route:
    //     the element keeps "playing" (t advances) with no sound, and only a
    //     fresh play() call re-grabs the route. (Why the watchdog never
    //     fired — the element wasn't paused.)
    //  3. Web Audio + a media element together crash the device.
    // Therefore ALL sound goes through the single #music-player element:
    // the beep is a temporary src-swap on it, and the music is "bounced"
    // (pause → play) after every video transition to re-grab the route.
    let beepBlobUrl = '';     // break-end.mp3  — 3-2-1 countdown before next exercise
    let chimeBlobUrl = '';    // break-start.mp3 — exercise-END chime (matches local player)
    let beepActive = false;   // a one-shot sound is playing through the element
    let musicRestore = null;  // { src, time } to restore after the one-shot
    let bounceTimer = null;
    let beepSafetyTimer = null; // force-ends a one-shot whose 'ended' never fires
    let videoStartTimer = null; // defers exercise video so it can't cut the beep

    function prefetchBeep(url) {
      if (beepBlobUrl && beepBlobUrl.indexOf('blob:') === 0) URL.revokeObjectURL(beepBlobUrl);
      beepBlobUrl = '';
      if (!url) return;
      fetch(url)
        .then(function (r) { return r.blob(); })
        .then(function (b) { beepBlobUrl = URL.createObjectURL(b); })
        .catch(function (e) {
          console.warn('[beep] prefetch failed, using network URL:', e);
          beepBlobUrl = url;
        });
    }

    function prefetchChime(url) {
      if (chimeBlobUrl && chimeBlobUrl.indexOf('blob:') === 0) URL.revokeObjectURL(chimeBlobUrl);
      chimeBlobUrl = '';
      if (!url) return;
      fetch(url)
        .then(function (r) { return r.blob(); })
        .then(function (b) { chimeBlobUrl = URL.createObjectURL(b); })
        .catch(function (e) {
          console.warn('[chime] prefetch failed, using network URL:', e);
          chimeBlobUrl = url;
        });
    }

    // Re-grab the audio route after a video transition: pause + short delay
    // + play. Only needed when the element is "playing" (possibly silently).
    function bounceMusic(reason) {
      const m = dom.musicPlayer;
      if (beepActive || !hasMusicSrc() || m.paused || isPaused) return;
      pauseMusic(reason);
      if (bounceTimer) clearTimeout(bounceTimer);
      // 800ms: the one delay we KNOW re-grabs the route on this device
      // (v2.7's exercise-start resume) — 250ms was too close to the video
      // transition and the music stayed silent
      bounceTimer = setTimeout(function () {
        bounceTimer = null;
        if (!beepActive && !isPaused && hasMusicSrc() && dom.musicPlayer.paused) {
          playMusic();
        }
      }, 800);
    }

    // Fade the music out over ~1s ahead of the beep swap, so the inherent
    // 1–2s session-switch gap on this device reads as a designed transition
    // (music fades → beeps → exercise) instead of an abrupt cut to silence.
    let fadeTimer = null;
    let beepFadeArmed = false;

    function fadeOutMusicForBeep(ms) {
      // Used ahead of BOTH one-shot sounds (countdown beep and exercise-end
      // chime) — fade only if some sound will follow and music is playing.
      if ((!beepBlobUrl && !chimeBlobUrl) || beepActive || !hasMusicSrc() || dom.musicPlayer.paused) return;
      if (fadeTimer) clearInterval(fadeTimer);
      beepFadeArmed = true;
      const el = dom.musicPlayer;
      const startVol = el.volume;
      const steps = Math.max(1, Math.round(ms / 80));
      let i = 0;
      fadeTimer = setInterval(function () {
        i++;
        el.volume = clamp01(startVol * (1 - i / steps));
        if (i >= steps) {
          clearInterval(fadeTimer);
          fadeTimer = null;
          pauseMusic('beepFade');
          // Safety: if the beep never fires (e.g. skip mid-fade), un-arm and
          // bring the music back rather than leaving it silently paused
          setTimeout(function () {
            if (beepFadeArmed && !beepActive) {
              beepFadeArmed = false;
              if (!isPaused && hasMusicSrc() && dom.musicPlayer.paused) {
                fadeInMusic(800);
                playMusic();
              }
            }
          }, 3000);
        }
      }, 80);
    }

    // Mirror of the fade-out: ramp from silence up to the phase-appropriate
    // volume so the music returns softly instead of at full blast.
    function fadeInMusic(ms) {
      const el = dom.musicPlayer;
      const target = clamp01(phase === 'exercise' ? userMusicVolume * DUCK_RATIO : userMusicVolume);
      if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
      const steps = Math.max(1, Math.round(ms / 80));
      let i = 0;
      el.volume = 0;
      fadeTimer = setInterval(function () {
        i++;
        el.volume = clamp01(target * (i / steps));
        if (i >= steps) { clearInterval(fadeTimer); fadeTimer = null; }
      }, 80);
    }

    // Play a short one-shot sound (the 3-2-1 countdown beep OR the exercise-end
    // chime) through the single shared audio element. This device mixes only
    // one audio stream, so a "sound" is a temporary src-swap on the music
    // element; the music is captured and restored when the sound ends.
    //   blobUrl        — which sound (beepBlobUrl / chimeBlobUrl)
    //   forceNoRestore — true for the FINAL exercise-end chime: the workout is
    //                    ending, so don't bring music back afterwards.
    function playOneShot(blobUrl, forceNoRestore) {
      if (!blobUrl || beepActive) return;
      if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
      beepFadeArmed = false;
      const m = dom.musicPlayer;
      const currentSrc = m.getAttribute('src');
      const isSoundSrc = currentSrc === beepBlobUrl || currentSrc === chimeBlobUrl;
      const hadMusic = !!currentSrc && !isSoundSrc;
      musicRestore = (hadMusic && !forceNoRestore)
        ? { src: currentSrc, time: m.currentTime || 0 }
        : null;
      beepActive = true;
      if (hadMusic) pauseMusic('beep');
      m.onended = finishBeep;
      m.onerror = finishBeep;
      m.loop = false; // CRITICAL: a one-shot must never loop (client's "stuck
                      // looping the whole workout" bug is loop=true + sound src)
      m.src = blobUrl;
      m.volume = 1;
      m.load();
      // Hard safety net: if 'ended' never fires (a device media quirk we've
      // seen) the sound must still terminate. Force-finish it after roughly its
      // own length so it can't linger — let alone loop — for the whole workout.
      if (beepSafetyTimer) clearTimeout(beepSafetyTimer);
      beepSafetyTimer = setTimeout(function () {
        if (beepActive) { console.warn('[oneshot] safety timer force-finish'); finishBeep(); }
      }, 4500);
      const p = m.play();
      if (p && p.catch) p.catch(function (e) {
        console.warn('[oneshot] play failed:', e && e.name);
        finishBeep();
      });
    }

    // 3-2-1 countdown beep (break-end.mp3) — music resumes after into the exercise.
    function playCountdownBeep() { playOneShot(beepBlobUrl, false); }
    // Exercise-end chime (break-start.mp3) — mirrors the local player. On the
    // final exercise it's the end-of-workout cue, after which nothing resumes.
    function playChime(isFinal) { playOneShot(chimeBlobUrl, isFinal); }

    function finishBeep() {
      const m = dom.musicPlayer;
      if (!beepActive) return;
      beepActive = false;
      beepFadeArmed = false;
      if (beepSafetyTimer) { clearTimeout(beepSafetyTimer); beepSafetyTimer = null; }
      m.onended = null;
      m.onerror = null;
      // Keep loop OFF until a real music track is back on the element — never
      // leave the element with loop=true AND the beep src (that's the looping
      // bug). loop is re-enabled below only after the music src is assigned.
      m.loop = false;
      if (musicRestore) {
        const r = musicRestore;
        musicRestore = null;
        m.src = r.src;
        m.loop = true; // music track is back — restore looping
        m.load();
        const onReady = function () {
          m.removeEventListener('canplay', onReady);
          try { m.currentTime = r.time; } catch (e) {}
          if (!isPaused) {
            // fade back up — mirrors the fade-out into the beep
            fadeInMusic(1200);
            playMusic();
          } else {
            m.volume = clamp01(phase === 'exercise' ? userMusicVolume * DUCK_RATIO : userMusicVolume);
          }
        };
        m.addEventListener('canplay', onReady);
      } else {
        // No music to restore. Do NOT removeAttribute()+load() here — tearing
        // the element down right after playback crashes this device (confirmed
        // on hardware: beep with no music selected crashed at beep end).
        // Park the beep src on the PAUSED element (loop off). Every music-resume
        // path checks hasMusicSrc() and ignores a parked beep. Force the pause
        // in case the device kept the beep going despite loop=false.
        m.loop = false;
        m.volume = clamp01(userMusicVolume);
        if (!m.paused) { try { m.pause(); } catch (e) {} }
      }
    }

    // True only when the element holds an actual music track (not a
    // parked/playing one-shot sound — the beep or the chime)
    function hasMusicSrc() {
      const s = dom.musicPlayer.getAttribute('src');
      return !!s && s !== beepBlobUrl && s !== chimeBlobUrl;
    }

    // Audio ducking: music volume during exercise vs break
    let userMusicVolume = 0.3; // volume set by user
    // No ducking: the exercise videos have no audio track, so there's nothing
    // to duck against — keep music at full user volume. (Was 0.3, which made
    // music near-silent during exercises.)
    const DUCK_RATIO = 1;

    /* ─── Helpers ─── */
    function formatTime(seconds) {
      if (isNaN(seconds) || seconds < 0) seconds = 0;
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      return m + ':' + String(s).padStart(2,'0');
    }

    // Media element .volume MUST be in [0,1]; anything outside throws an
    // IndexSizeError. A stale/buggy sender (e.g. volume 100) would otherwise
    // crash the receiver and reset the Chromecast — so clamp every assignment.
    function clamp01(v) {
      v = Number(v);
      if (isNaN(v)) return 0;
      return Math.max(0, Math.min(1, v));
    }

    // Countdown beep (3-2-1) with the single-audio-stream constraint:
    // pause the music, attach the beep src just for this playback, and fully
    // release it (remove src + load()) the moment it ends or errors. Music
    // resumes when the next exercise starts (startExercise → playMusic).
    // Start the music robustly. Wait for canplay (in changeMusic) before this,
    // so play() doesn't race the load. An AbortError just means play() got
    // interrupted by a pause()/load() — retry once if we still intend to play.
    function playMusic() {
      const el = dom.musicPlayer;
      if (!el.src) return;
      // never "resume" a parked one-shot sound (beep/chime) as if it were music
      const cur = el.getAttribute('src');
      if ((beepBlobUrl && cur === beepBlobUrl) || (chimeBlobUrl && cur === chimeBlobUrl)) return;
      const p = el.play();
      if (!p || !p.then) return;
      p.catch((e) => {
        if (e && e.name === 'AbortError') {
          setTimeout(() => {
            if (!isPaused && el.src && el.paused) {
              el.play().catch((e2) => console.warn('[music] play failed:', e2 && e2.name));
            }
          }, 300);
        } else {
          console.warn('[music] play failed:', e && e.name);
        }
      });
    }

    function clearTimers() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      if (exerciseInterval) { clearInterval(exerciseInterval); exerciseInterval = null; }
      if (videoStartTimer) { clearTimeout(videoStartTimer); videoStartTimer = null; }
      if (exerciseTimerFallback) { clearTimeout(exerciseTimerFallback); exerciseTimerFallback = null; }
    }

    function calculateTotalDuration() {
      let t = 0;
      for (let i = 0; i < exercises.length; i++) {
        t += (exercises[i].exerciseLength || 0);
        // the final exercise's break never plays, so keep it out of the
        // total or the progress bar tops out short of 100%
        if (i < exercises.length - 1) t += (exercises[i].break || 0);
      }
      return t;
    }

    function calculateElapsedAtIndex(idx) {
      let e = 0;
      for (let i = 0; i < idx && i < exercises.length; i++) {
        e += (exercises[i].exerciseLength || 0) + (exercises[i].break || 0);
      }
      return e;
    }

    function buildStepper() {
      dom.stepper.innerHTML = '';
      dom.stepper.style.gridTemplateColumns = 'repeat(' + exercises.length + ', 1fr)';
      for (let i = 0; i < exercises.length; i++) {
        const d = document.createElement('div');
        d.className = 'react-player-stepper';
        d.style.background = i < currentIndex ? '#FB7600'
          : (i === currentIndex ? '#fff' : 'rgba(255,255,255,0.25)');
        dom.stepper.appendChild(d);
      }
    }

    function updateProgressBar() {
      const pct = totalDuration > 0 ? Math.min((totalElapsed / totalDuration) * 100, 100) : 0;
      dom.progressBar.style.width = pct + '%';
      dom.elapsedTime.textContent = formatTime(totalElapsed);
      dom.totalTime.textContent = formatTime(totalDuration);
    }

    // Audio ducking: lower music when video is playing, restore during breaks
    function duckMusic() {
      if (beepActive) return; // don't re-volume the beep; finishBeep restores
      dom.musicPlayer.volume = clamp01(userMusicVolume * DUCK_RATIO);
    }
    function unduckMusic() {
      if (beepActive) return;
      dom.musicPlayer.volume = clamp01(userMusicVolume);
    }

    // ── Music stop forensics ──
    // Every deliberate music stop goes through pauseMusic(reason). If the
    // element fires 'pause' without a recent tag, the DEVICE stopped it —
    // that distinction is the whole point of the v2.8 instrumentation.
    let lastMusicStop = { reason: 'none', at: 0 };
    let lastDeliberatePauseAt = 0;

    function pauseMusic(reason) {
      lastMusicStop = { reason: reason, at: Date.now() };
      lastDeliberatePauseAt = Date.now();
      dom.musicPlayer.pause();
    }

    dom.musicPlayer.addEventListener('pause', function () {
      if (Date.now() - lastDeliberatePauseAt > 300) {
        lastMusicStop = { reason: 'device/unknown', at: Date.now() };
      }
    });

    function fmtLastStop() {
      if (!lastMusicStop.at) return 'none';
      return lastMusicStop.reason + '@' + Math.round((Date.now() - lastMusicStop.at) / 1000) + 's';
    }

    // Music watchdog: if the music element pauses/stalls while the workout is
    // active and the user hasn't paused, restart it. Not while the beep is
    // using the element or a post-beep restore is pending — those manage the
    // element themselves.
    function musicShouldBePlaying() {
      return (
        !isPaused &&
        !beepActive &&
        !beepFadeArmed &&
        !musicRestore &&
        !bounceTimer &&
        hasMusicSrc() &&
        phase !== 'idle' &&
        phase !== 'complete'
      );
    }
    ['pause', 'stalled', 'suspend'].forEach(function (evt) {
      dom.musicPlayer.addEventListener(evt, function () {
        setTimeout(function () {
          if (musicShouldBePlaying() && dom.musicPlayer.paused) {
            console.warn('[music] watchdog restart after "' + evt + '"');
            playMusic();
          }
        }, 400);
      });
    });

    function updatePlayPauseIcon() {
      dom.iconPause.style.display = isPaused ? 'none' : '';
      dom.iconPlay.style.display = isPaused ? '' : 'none';
    }

    function hideAll() {
      dom.idleScreen.classList.remove('active');
      dom.completeScreen.classList.remove('active');
      dom.breakOverlay.classList.remove('active');
      dom.controlsDetails.classList.remove('active');
      dom.controlsWrapper.classList.remove('active');
      dom.workoutTitleBar.classList.remove('active');
      dom.pausedOverlay.classList.remove('active');
      dom.exerciseCover.classList.remove('active');
    }

    function sendState() {
      try {
        if (!castReceiverContext) return;
        const ex = exercises[currentIndex];
        castReceiverContext.sendCustomMessage(NAMESPACE, undefined, {
          type: 'STATE_UPDATE',
          data: {
            receiverVersion: RECEIVER_VERSION,
            // Audio diagnostics — readable from the sender console via
            // receiverState, so remote tests can tell us what the music
            // element/beep context are doing without TV-side debugging
            musicPaused: dom.musicPlayer.paused,
            musicTime: Math.round((dom.musicPlayer.currentTime || 0) * 10) / 10,
            musicReadyState: dom.musicPlayer.readyState,
            musicError: dom.musicPlayer.error ? dom.musicPlayer.error.code : 0,
            musicLastStop: fmtLastStop(),
            beepActive: beepActive,
            beepLoaded: !!beepBlobUrl,
            phase, exerciseIndex: currentIndex,
            exerciseTitle: ex ? (ex.title || '') : '',
            exerciseTimeRemaining: phase === 'exercise' ? Math.max((ex?.exerciseLength || 0) - exerciseElapsed, 0) : 0,
            breakTimeRemaining: phase === 'break' ? countdownValue : 0,
            totalElapsed, totalDuration, isPaused,
            totalExercises: exercises.length,
          }
        });
      } catch (e) { console.warn('sendState error:', e); }
    }

    /* ─── LOAD WORKOUT ─── */
    function loadWorkout(data) {
      clearTimers();
      workout = data;
      exercises = data.exercises || [];
      currentIndex = data.startIndex || 0;
      totalDuration = calculateTotalDuration();
      totalElapsed = calculateElapsedAtIndex(currentIndex);
      isPaused = false;

      // Localization: merge the sender's translated label set (older senders
      // send none — keep the English defaults) and push into the static UI.
      if (data.labels && typeof data.labels === 'object') {
        labels = Object.assign({}, labels, data.labels);
      }
      applyStaticLabels();

      dom.workoutTitle.textContent = data.title || labels.workout;
      if (data.musicUrl) {
        dom.musicPlayer.src = data.musicUrl;
        userMusicVolume = clamp01(data.musicVolume != null ? data.musicVolume : 0.3);
        dom.musicPlayer.volume = userMusicVolume;
      }
      // Both sounds are prefetched to blobs and played later via a src-swap on
      // the single music element (playOneShot) — never attached as their own
      // <audio>, which would steal this device's one audio stream.
      //   break-end   → 3-2-1 countdown before the next exercise
      //   break-start → exercise-END chime (matches the local player)
      prefetchBeep(data.breakEndSoundUrl);
      prefetchChime(data.breakStartSoundUrl);

      // A LOAD_WORKOUT can arrive mid-exercise (user picked another exercise
      // on the phone) — stop the running video or it keeps playing behind
      // the Get Ready countdown
      dom.video.onended = null;
      dom.video.pause();
      dom.video.removeAttribute('src');
      dom.video.load();

      startGetReady();
    }

    /* ─── GET READY (uses break overlay with "Get Ready" text) ─── */
    function startGetReady() {
      phase = 'get_ready';
      clearTimers();
      hideAll();

      const ex = exercises[currentIndex];
      dom.breakLabelText.textContent = labels.getReady;
      // Exercise name is shown verbatim (never translated, per client)
      dom.breakNextText.textContent = ex ? (ex.title || 'Exercise ' + (currentIndex + 1)) : '';
      if (ex && ex.videoThumbnailURL) {
        dom.breakNextThumb.src = ex.videoThumbnailURL;
        dom.breakNextThumb.style.display = '';
      } else {
        dom.breakNextThumb.style.display = 'none';
      }
      countdownValue = GET_READY_SECONDS;
      dom.breakCountdown.textContent = countdownValue;
      dom.breakProgressBar.style.width = '0%';

      dom.breakOverlay.classList.add('active');
      dom.workoutTitleBar.classList.add('active');

      // Full music volume during get-ready (no video audio)
      unduckMusic();

      sendState();

      countdownInterval = setInterval(() => {
        if (isPaused) return;
        countdownValue--;
        dom.breakCountdown.textContent = Math.max(countdownValue, 0);
        const pct = ((GET_READY_SECONDS - countdownValue) / GET_READY_SECONDS) * 100;
        dom.breakProgressBar.style.width = pct + '%';

        // Play the full countdown sound ONCE at 3s remaining (the file is
        // the entire "beep beep beep beeeep" pattern) — a src-swap on the
        // music element, restored automatically when it ends.
        if (countdownValue === 3) {
          playCountdownBeep();
        }
        if (countdownValue <= 0) {
          clearInterval(countdownInterval); countdownInterval = null;
          startExercise();
        }
      }, 1000);
    }

    /* ─── EXERCISE ─── */
    function startExercise() {
      phase = 'exercise';
      clearTimers();
      hideAll();

      const ex = exercises[currentIndex];
      if (!ex) { finishWorkout(); return; }

      // Show exercise UI (same layers as RenderedVideoPlayer)
      dom.controlsDetails.classList.add('active');
      dom.controlsWrapper.classList.add('active');
      dom.workoutTitleBar.classList.add('active');

      // Exercise title & countdown
      dom.exerciseTitle.textContent = ex.title || 'Exercise ' + (currentIndex + 1);
      exerciseElapsed = 0;
      chimeFired = false;
      chimeFadeStarted = false;
      const exLen = ex.exerciseLength || 0;
      dom.exerciseTimer.textContent = exLen > 0 ? exLen : '';
      dom.exerciseTimerWrap.style.display = exLen > 0 ? '' : 'none';

      // "Up next: Rest X sec" in bottom-right — not on the last exercise,
      // whose trailing break is skipped
      const brk = ex.break || 0;
      if (brk > 0 && currentIndex < exercises.length - 1) {
        dom.detailsBreakInfo.innerHTML =
          labels.upNext + ': ' + labels.rest +
          ' <span style="font-size:40px;margin:0 6px;">' + brk + '</span> ' +
          labels.sec.toLowerCase();
      } else {
        dom.detailsBreakInfo.textContent = '';
      }

      buildStepper();
      updateProgressBar();
      updatePlayPauseIcon();

      // NOTE: muting the video to free the audio output for the music crashes
      // this Chromecast (can't decode video + output a 2nd audio stream). Left
      // unmuted for stability — cast music handled on the sender side instead.
      dom.video.loop = false; // break-time looping ends with the break
      if (videoStartTimer) { clearTimeout(videoStartTimer); videoStartTimer = null; }
      if (ex.videoURL) {
        // Cover the video until the NEW clip is playing, so the previous
        // exercise (still looping behind the scenes) never flashes on screen
        // and the black load gap is hidden. Revealed in kickTimer on 'playing'.
        dom.exerciseCover.classList.add('active');
        const loadAndPlayVideo = function () {
          dom.video.src = ex.videoURL;
          dom.video.load();
          dom.video.play().catch(e => console.warn('Video play error:', e));
        };
        if (beepActive) {
          // A countdown beep is still finishing (natural break → exercise).
          // Touching the video AT ALL now — even src=/load(), not just play() —
          // reconfigures this device's single audio pipeline and clips the
          // beep's "...Go" tail (the intermittent "go disappears" bug; the
          // 3-2-1 is already out, only the tail is lost). So wait until the
          // beep has fully ended, THEN load the video. It also breaks the music
          // route on this device, so bounce the music to re-grab it afterwards.
          // Capped so a stuck beep can't hold the video forever (the beep's own
          // 4.5s safety timer clears beepActive well within this).
          const afterBeep = function () {
            videoStartTimer = null;
            loadAndPlayVideo();
            if (hasMusicSrc() && !isPaused) bounceMusic('reroute-after-beep');
          };
          let waited = 0;
          const poll = function () {
            if (!beepActive || waited >= 2500) { afterBeep(); }
            else { waited += 100; videoStartTimer = setTimeout(poll, 100); }
          };
          videoStartTimer = setTimeout(poll, 100);
        } else {
          // No beep in flight (skip/load) — start immediately, no clip risk.
          loadAndPlayVideo();
        }
      }

      // Music — duck volume while video plays. If the beep is still playing
      // through the element, finishBeep() restores + resumes the music when
      // it ends; otherwise re-grab the route broken by video.play() (bounce)
      // or restart a paused track.
      duckMusic();
      if (hasMusicSrc() && !beepActive) {
        if (dom.musicPlayer.paused) {
          if (!isPaused) playMusic();
        } else {
          bounceMusic('reroute-exercise');
        }
      }

      sendState();

      // Start the countdown IN SYNC WITH THE VIDEO. If we start it now, a slow
      // video load lets the timer run ahead — the user saw the video begin when
      // the count had already dropped ~3s. So wait for the video's 'playing'
      // event; the timer display already shows the full duration until then.
      // A fallback starts it anyway after 4s so a stalled/broken video (or one
      // with no source) can't freeze the exercise. exerciseGen invalidates this
      // exercise's handler if the user skips before the video plays.
      const myGen = ++exerciseGen;
      const kickTimer = function () {
        // Reveal the new video regardless of gen/interval state: 'playing'
        // only fires when the current clip is actually rendering, so this is
        // exactly the right moment to drop the cover.
        dom.exerciseCover.classList.remove('active');
        if (myGen !== exerciseGen || exerciseInterval) return;
        if (exerciseTimerFallback) { clearTimeout(exerciseTimerFallback); exerciseTimerFallback = null; }
        beginExerciseTimer(exLen);
      };
      if (ex.videoURL) {
        dom.video.addEventListener('playing', kickTimer, { once: true });
        if (exerciseTimerFallback) clearTimeout(exerciseTimerFallback);
        exerciseTimerFallback = setTimeout(kickTimer, 4000);
      } else {
        kickTimer(); // no video to wait on
      }

      if (!exLen || exLen <= 0) {
        dom.video.onended = () => { clearInterval(exerciseInterval); exerciseInterval = null; onExerciseEnd(); };
      } else {
        dom.video.onended = null;
      }
    }

    // The per-second exercise countdown, split out so it can be started only
    // once the video is actually playing (see startExercise / kickTimer).
    function beginExerciseTimer(exLen) {
      if (exerciseInterval) return; // never double-start
      exerciseInterval = setInterval(() => {
        if (isPaused) return;
        exerciseElapsed++;
        totalElapsed++;
        const remaining = Math.max(exLen - exerciseElapsed, 0);
        if (exLen > 0) dom.exerciseTimer.textContent = remaining;
        updateProgressBar();
        // Softly fade the background music down ~1s BEFORE the chime fires, so
        // the music dips out gracefully instead of cutting abruptly (finishBeep
        // fades it back up afterwards). Same transition as the countdown beep.
        if (exLen > 0 && !chimeFadeStarted && remaining <= CHIME_LEAD_SECONDS + 1) {
          chimeFadeStarted = true;
          fadeOutMusicForBeep(900);
        }
        // Fire the exercise-end chime a beat EARLY so the ~1s session-switch
        // lands it right on the transition (see CHIME_LEAD_SECONDS). Only for
        // timed exercises — video-length ones have no predictable end, so their
        // chime fires from onExerciseEnd instead.
        if (exLen > 0 && !chimeFired && remaining <= CHIME_LEAD_SECONDS) {
          chimeFired = true;
          playChime(currentIndex >= exercises.length - 1);
        }
        sendState();
        if (exLen > 0 && exerciseElapsed >= exLen) {
          clearInterval(exerciseInterval); exerciseInterval = null;
          onExerciseEnd();
        }
      }, 1000);
    }

    function onExerciseEnd() {
      const ex = exercises[currentIndex];
      const brk = ex ? (ex.break || 0) : 0;
      // No trailing break after the final exercise (matches the local
      // player) — go straight to the completion screen
      const isLast = currentIndex >= exercises.length - 1;
      // Exercise-end chime — the local player plays break-start.mp3 the moment
      // the exercise timer hits 0, on every exercise INCLUDING the last (where
      // it doubles as the end-of-workout cue). Fire it AFTER the video
      // transition below so the seek/pause pipeline blip can't clip the chime.
      if (brk > 0 && !isLast) {
        // Do NOT pause the video for a break: a paused video element holds
        // this device's media pipeline hostage — the music stalls (t frozen,
        // silent, no error) and the beep queues until the next video.play()
        // flushes it (proven by the v2.9.2 on-screen diagnostics). Keep it
        // playing + looping, invisible behind the opaque break overlay.
        dom.video.onended = null;
        dom.video.loop = true;
        // Restart from 0 so the loop point lands as late as possible — but NOT
        // while the (early-fired) chime is still sounding: the seek's pipeline
        // blip would clip it. The break's "5" guard re-seeks before the
        // countdown beep anyway.
        if (!beepActive) { try { dom.video.currentTime = 0; } catch (e) {} }
        if (dom.video.src && dom.video.paused) {
          dom.video.play().catch(function () {});
        }
        // Timed exercises already fired the chime early; only video-length ones
        // (no predictable end) still need it fired here.
        if (!chimeFired) playChime(false);
        startBreak(brk);
      } else {
        dom.video.pause();
        if (!chimeFired) playChime(true); // final chime — nothing resumes after
        advanceToNext();
      }
    }

    /* ─── BREAK (uses same .break-layout-for-player overlay) ─── */
    function startBreak(duration) {
      phase = 'break';
      clearTimers();
      hideAll();

      const breakTotal = duration;
      countdownValue = duration;
      dom.breakCountdown.textContent = countdownValue;
      dom.breakProgressBar.style.width = '0%';
      dom.breakLabelText.textContent = labels.rest;

      const nextEx = exercises[currentIndex + 1];
      // Label localized; exercise name verbatim
      dom.breakNextText.textContent = nextEx
        ? labels.nextExercise + ': ' + (nextEx.title || 'Exercise ' + (currentIndex + 2))
        : labels.finish;
      if (nextEx && nextEx.videoThumbnailURL) {
        dom.breakNextThumb.src = nextEx.videoThumbnailURL;
        dom.breakNextThumb.style.display = '';
      } else {
        dom.breakNextThumb.style.display = 'none';
      }

      dom.breakOverlay.classList.add('active');
      dom.workoutTitleBar.classList.add('active');

      // Restore music volume during rest (no video audio competing)
      unduckMusic();

      // The video keeps playing (hidden) through the break, so there's no
      // pipeline transition here — the music just continues. Only restart it
      // if something left it paused.
      if (hasMusicSrc() && !beepActive && dom.musicPlayer.paused && !isPaused) {
        playMusic();
      }

      // Breaks too short to reach the "4" tick: start the beep swap now
      // (its ~1s session-init means the sound lands mid-break)
      if (breakTotal <= 4) {
        playCountdownBeep();
      }

      // NOTE: no break-start sound here. The sender sends its URL as null,
      // and calling play() on the empty element at break start can grab this
      // device's single audio output and silence the music for the whole rest.
      sendState();

      countdownInterval = setInterval(() => {
        if (isPaused) return;
        countdownValue--;
        totalElapsed++;
        dom.breakCountdown.textContent = Math.max(countdownValue, 0);
        dom.breakProgressBar.style.width = ((breakTotal - countdownValue) / breakTotal * 100) + '%';
        updateProgressBar();
        // "5": start fading the music out (~1s) so the transition into the
        // beep reads as intentional. "4": fire the beep swap ONE TICK EARLY —
        // tearing down the music session and starting the beep's takes this
        // device ~1s, so the sound lands on "3" and the full
        // beep-beep-beep-chime pattern finishes before the exercise's video
        // swap can clip it. (Get Ready triggers at "3" — idle element,
        // instant start.)
        if (countdownValue === 5) {
          fadeOutMusicForBeep(900);
          // Loop-point guard: if the hidden video would wrap within the next
          // ~7s (i.e. during the beep), rewind it NOW — the seek's pipeline
          // blip lands in the fade where it's inaudible, and the beep window
          // is guaranteed loop-free
          try {
            const v = dom.video;
            if (v.duration && !v.paused && v.duration - v.currentTime < 7) {
              v.currentTime = 0;
            }
          } catch (e) {}
        }
        if (countdownValue === 4) {
          playCountdownBeep();
        }
        sendState();
        if (countdownValue <= 0) { clearInterval(countdownInterval); countdownInterval = null; advanceToNext(); }
      }, 1000);
    }

    /* ─── NAVIGATION ─── */
    function advanceToNext() {
      currentIndex++;
      if (currentIndex >= exercises.length) finishWorkout(); else startExercise();
    }
    function skipNext() {
      clearTimers();
      currentIndex++;
      if (currentIndex >= exercises.length) finishWorkout();
      else { totalElapsed = calculateElapsedAtIndex(currentIndex); startExercise(); }
    }
    function skipPrev() {
      clearTimers();
      if (currentIndex > 0) currentIndex--;
      totalElapsed = calculateElapsedAtIndex(currentIndex);
      startExercise();
    }

    /* ─── COMPLETE ─── */
    function finishWorkout() {
      phase = 'complete';
      clearTimers(); hideAll();
      dom.video.pause();
      // Don't pause the element while the end-of-workout chime is still playing
      // through it — that would cut the chime. It parks itself silent when it
      // ends (playChime(true) → no music restore). Only stop music otherwise.
      if (!beepActive) pauseMusic('finish');
      dom.completeWorkout.textContent = workout ? (workout.title || '') : '';
      dom.completeScreen.classList.add('active');
      totalElapsed = totalDuration;
      sendState();
    }

    /* ─── PAUSE / RESUME ─── */
    function pause() {
      isPaused = true;
      dom.video.pause();
      pauseMusic('userPause');
      dom.pausedOverlay.classList.add('active');
      updatePlayPauseIcon();
      sendState();
    }
    function resume() {
      isPaused = false;
      dom.pausedOverlay.classList.remove('active');
      // 'break' too: the hidden video must keep playing through breaks or the
      // paused element blocks the media pipeline (music/beep go silent)
      if ((phase === 'exercise' || phase === 'break') && dom.video.src) dom.video.play().catch(() => {});
      if (dom.musicPlayer.src) playMusic();
      updatePlayPauseIcon();
      sendState();
    }
    function togglePause() { if (isPaused) resume(); else pause(); }

    /* ─── MUSIC & VOLUME ─── */
    function changeMusic(url, volume) {
      // The beep is borrowing the element right now — redirect the change to
      // the post-beep restore target instead of stomping the beep playback
      if (beepActive) {
        musicRestore = url ? { src: url, time: 0 } : null;
        if (volume != null) userMusicVolume = clamp01(volume);
        return;
      }
      if (url) {
        const el = dom.musicPlayer;
        el.src = url;
        el.loop = true; // music always loops (a prior no-music beep may have
                        // parked the element with loop off — restore it)
        el.load();
        // Play only once the element is ready. Calling play() while the new src
        // is still loading races the internal load and rejects with AbortError,
        // so the music never starts.
        const onReady = () => {
          el.removeEventListener('canplay', onReady);
          playMusic();
        };
        el.addEventListener('canplay', onReady);
      }
      else {
        // removeAttribute, not src='': assigning '' resolves .src to the page
        // URL (truthy), which would let the music watchdog restart "music"
        // after the user picked No Music. No load() after the teardown —
        // resetting the element right after playback crashes this device.
        pauseMusic('changeMusic');
        dom.musicPlayer.removeAttribute('src');
      }
      if (volume != null) {
        userMusicVolume = clamp01(volume);
        // Apply ducking if currently in exercise phase
        dom.musicPlayer.volume = clamp01(phase === 'exercise' ? userMusicVolume * DUCK_RATIO : userMusicVolume);
      }
    }
    function setVolume(data) {
      if (data.videoVolume != null) dom.video.volume = clamp01(data.videoVolume);
      if (data.musicVolume != null) {
        userMusicVolume = clamp01(data.musicVolume);
        dom.musicPlayer.volume = clamp01(phase === 'exercise' ? userMusicVolume * DUCK_RATIO : userMusicVolume);
      }
    }

    /* ─── MESSAGE HANDLER ─── */
    function handleMessage(msg) {
      console.log('[Receiver]', msg.type, msg.data);
      try {
        switch (msg.type) {
          case 'LOAD_WORKOUT': loadWorkout(msg.data); break;
          case 'PLAY': resume(); break;
          case 'PAUSE': pause(); break;
          case 'TOGGLE_PAUSE': togglePause(); break;
          case 'SKIP_NEXT': skipNext(); break;
          case 'SKIP_PREV': skipPrev(); break;
          case 'CHANGE_MUSIC': changeMusic(msg.data.musicUrl, msg.data.musicVolume); break;
          case 'SET_VOLUME': setVolume(msg.data); break;
        }
      } catch (e) {
        // Never let a handler error bubble up and reset the receiver.
        console.warn('[Receiver] handler error:', msg && msg.type, e && e.name, e && e.message);
      }
    }

    // Safety net: keep an uncaught error / rejection from tearing down the receiver.
    window.addEventListener('error', (ev) => {
      console.warn('[Receiver] window error:', ev && ev.message);
    });
    window.addEventListener('unhandledrejection', (ev) => {
      console.warn('[Receiver] unhandled rejection:', ev && ev.reason);
    });

    /* ─── ON-SCREEN BUTTONS ─── */
    dom.btnPlayPause.addEventListener('click', togglePause);
    dom.btnNext.addEventListener('click', skipNext);
    dom.btnPrev.addEventListener('click', skipPrev);

    /* ─── CAST RECEIVER INIT ─── */
    // Stamp the version badge so the TV visibly shows which build it loaded
    $('receiver-version').textContent = RECEIVER_VERSION;
    console.log('[Receiver] version:', RECEIVER_VERSION);

    let castReceiverContext = null;
    const urlParams = new URLSearchParams(window.location.search);
    const forceDebug = urlParams.has('debug');
    const isCastEnvironment = !forceDebug
      && navigator.userAgent.indexOf('CrKey') !== -1
      && !!(window.cast && window.cast.framework && window.cast.framework.CastReceiverContext);

    if (isCastEnvironment) {
      castReceiverContext = cast.framework.CastReceiverContext.getInstance();
      castReceiverContext.addCustomMessageListener(NAMESPACE, (e) => handleMessage(e.data));
      castReceiverContext.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
        if (castReceiverContext.getSenders().length === 0) {
          clearTimers(); dom.video.pause(); pauseMusic('disconnect'); window.close();
        }
      });
      const opts = new cast.framework.CastReceiverOptions();
      opts.disableIdleTimeout = true;
      opts.skipPlayersLoad = true;
      castReceiverContext.start(opts);
    } else {
      /* ─── BROWSER DEBUG MODE ─── */
      console.log('[Receiver] BROWSER DEBUG MODE');

      const panel = document.createElement('div');
      panel.innerHTML = `
        <style>
          #dbg { position:fixed; top:10px; right:10px; z-index:9999; background:rgba(0,0,0,0.92);
            border:2px solid var(--color-orange); border-radius:8px; padding:15px 18px;
            font-family:monospace; font-size:13px; color:#fff; min-width:240px; }
          #dbg h3 { margin:0 0 10px; color:var(--color-orange); font-size:14px; }
          #dbg button { display:block; width:100%; margin:4px 0; padding:8px 12px;
            background:#1d242c; color:#fff; border:1px solid #333;
            border-radius:4px; cursor:pointer; font-size:13px; text-align:left; }
          #dbg button:hover { background:var(--color-orange); color:#000; }
          #dbg .st { color:#888; margin-top:10px; font-size:11px; line-height:1.5; }
        </style>
        <div id="dbg">
          <h3>Cast Debug Panel</h3>
          <button id="dbg-load">Load Demo Workout</button>
          <button id="dbg-pause">Pause / Resume</button>
          <button id="dbg-next">Skip Next</button>
          <button id="dbg-prev">Skip Prev</button>
          <div class="st" id="dbg-st">Status: idle</div>
        </div>`;
      document.body.appendChild(panel);

      const demo = {
        title: 'Demo Workout', subtitle: 'Cast Receiver Test',
        exercises: [
          { videoURL: '', title: 'Squat Jumps', exerciseLength: 8, break: 5 },
          { videoURL: '', title: 'Push Ups', exerciseLength: 10, break: 5 },
          { videoURL: '', title: 'Burpees', exerciseLength: 8, break: 0 },
        ],
        startIndex: 0, musicUrl: null, musicVolume: 0.3,
        breakStartSoundUrl: null, breakEndSoundUrl: null,
      };

      const _ss = sendState;
      sendState = function() {
        _ss();
        const el = $('dbg-st');
        if (el) {
          const labels = { idle:'Idle', get_ready:'Get Ready', exercise:'Exercise', break:'Rest', complete:'Complete' };
          el.innerHTML = '<b>' + (labels[phase]||phase) + '</b> | '
            + (exercises[currentIndex]?.title||'') + ' (' + (currentIndex+1) + '/' + exercises.length + ')'
            + '<br>' + formatTime(totalElapsed) + ' / ' + formatTime(totalDuration);
        }
      };

      $('dbg-load').onclick = () => loadWorkout(demo);
      $('dbg-pause').onclick = togglePause;
      $('dbg-next').onclick = skipNext;
      $('dbg-prev').onclick = skipPrev;
    }
  </script>
</body>
</html>
